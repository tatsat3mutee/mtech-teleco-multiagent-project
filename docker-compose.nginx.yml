# Optional nginx front-door overlay — serves the app on port 80.
# Usage: docker compose -f docker-compose.yml -f docker-compose.nginx.yml up -d --build
# deploy/nginx.conf proxies:  /  → Streamlit (WebSocket-aware)   /mlflow/ → MLflow
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rca_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit
      - mlflow
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - rca_net
