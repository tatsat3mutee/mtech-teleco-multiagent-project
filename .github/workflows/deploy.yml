name: CD — Deploy to AWS EC2

# Deploys to the EC2 instance over SSH after a successful push to main.
# Enable by setting:
#   Repository variable: DEPLOY_TARGET = ec2
#   Secrets: EC2_HOST (Elastic IP), EC2_SSH_KEY (contents of the .pem)
# The step mirrors the manual update procedure in docs/AWS_DEPLOY.md:
# git pull → systemd restart (compose rebuild) → health checks.
# Skips silently until DEPLOY_TARGET is set — pushes never fail red.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "*.txt"

jobs:
  deploy-ec2:
    runs-on: ubuntu-latest
    if: vars.DEPLOY_TARGET == 'ec2'

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: "22"
          script: |
            cd /opt/rca-platform
            sudo git pull origin main
            sudo docker compose build
            sudo docker builder prune -f --keep-storage 4GB
            sudo systemctl restart rca-platform
            sleep 30
            curl -sf http://localhost:8501/_stcore/health && echo "Streamlit healthy"
            curl -sf http://localhost:8000/health && echo "API healthy"
            echo "Deployment complete"
